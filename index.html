<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sims Clone | Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #1a1a2e; 
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .login-card { 
            background: #16213e; 
            padding: 2.5rem; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            text-align: center; 
            width: 350px;
        }
        h1 { color: #4ecca3; margin-bottom: 0.5rem; }
        input { 
            display: block; 
            width: 100%; 
            padding: 12px; 
            margin: 15px 0; 
            border-radius: 8px; 
            border: 1px solid #0f3460; 
            background: #0f3460;
            color: white;
            box-sizing: border-box;
        }
        button { 
            background: #e94560; 
            color: white; 
            border: none; 
            padding: 12px; 
            cursor: pointer; 
            border-radius: 8px; 
            width: 100%; 
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover { background: #ff5e78; transform: translateY(-2px); }
        #status { margin-top: 15px; font-size: 0.9rem; color: #999; }
    </style>
</head>
<body>

<div class="login-card">
    <h1>Sims Clone</h1>
    <p>Sign in to start your life.</p>
    <input type="email" id="email" placeholder="Email Address">
    <input type="password" id="password" placeholder="Password">
    <button onclick="handleAuth()">Enter World</button>
    <div id="status"></div>
</div>

<script>
    // Your specific Supabase Configuration
    const SUPABASE_URL = 'https://sjomitglpwjyttsaxjat.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_GC2hg2u7yvF5N2oRUr2VnA_VxxN3Iz1';
    
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function handleAuth() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const status = document.getElementById('status');
        
        status.innerText = "Processing...";

        // Logic: Try to sign up first. If user exists, try to sign in.
        const { data, error: signUpError } = await _supabase.auth.signUp({
            email: email,
            password: password,
        });

        if (signUpError) {
            // If already registered, attempt login
            const { error: signInError } = await _supabase.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (signInError) {
                status.innerText = "Error: " + signInError.message;
            } else {
                status.innerText = "Logging in...";
                window.location.href = "create.html";
            }
        } else {
            status.innerText = "Account created! Check email for verification if enabled.";
            // If email confirm is off in Supabase, we can redirect immediately:
            window.location.href = "create.html";
        }
    }
</script>

</body>
</html>
