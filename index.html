<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sims Clone | Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a2e; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: #16213e; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); text-align: center; }
        input { display: block; width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        button { background: #0f3460; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; width: 100%; }
        button:hover { background: #e94560; }
    </style>
</head>
<body>

<div class="login-card">
    <h1>Sims Clone</h1>
    <p>Sign in to start living.</p>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="signIn()">Sign In / Sign Up</button>
    <div id="status"></div>
</div>

<script>
    // REPLACE THESE with your actual Supabase details
    const SUPABASE_URL = 'https://YOUR_PROJECT_ID.supabase.co';
    const SUPABASE_KEY = 'YOUR_ANON_KEY';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function signIn() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        // This attempts to sign up; if user exists, you can switch to signInWithPassword
        const { data, error } = await supabase.auth.signUp({
            email: email,
            password: password,
        });

        if (error) {
            document.getElementById('status').innerText = error.message;
        } else {
            document.getElementById('status').innerText = "Success! Redirecting...";
            window.location.href = "create.html"; // Move to character creation
        }
    }
</script>

</body>
</html>
