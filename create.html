<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create A Sim | High Fidelity</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --ts-blue-light: #5ba8f5;
            --ts-blue-dark: #1b4e8d;
            --ts-green: #7fff00;
        }

        body { 
            margin: 0; 
            background: radial-gradient(circle, var(--ts-blue-light) 0%, var(--ts-blue-dark) 100%); 
            font-family: "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            color: white;
        }

        /* Top Left: Name & Plumbob */
        #identity-section {
            position: absolute;
            top: 40px;
            left: 40px;
            z-index: 10;
            display: flex;
            align-items: center;
        }

        .plumbob {
            width: 50px;
            height: 50px;
            background: var(--ts-green);
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
            margin-right: 20px;
            filter: drop-shadow(0 0 15px rgba(127, 255, 0, 0.6));
        }

        #simName {
            background: none;
            border: none;
            border-bottom: 2px solid rgba(255,255,255,0.7);
            color: white;
            font-size: 28px;
            outline: none;
            width: 300px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Right Side: Circular Categories */
        #category-nav {
            position: absolute;
            top: 40px;
            right: 40px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 10;
        }

        .nav-circle {
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 32px;
            transition: all 0.2s ease;
        }

        .nav-circle:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.1);
        }

        /* Gender Toggle */
        .gender-select {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }

        .gender-btn {
            background: rgba(0,0,0,0.2);
            border: 1px solid white;
            color: white;
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
        }

        /* Bottom Right: Iconic Play Button */
        #play-action {
            position: absolute;
            bottom: 50px;
            right: 50px;
            z-index: 10;
        }

        .play-btn {
            width: 120px;
            height: 120px;
            background: #4ecc70;
            border: 6px solid white;
            border-radius: 50%;
            color: white;
            font-weight: 900;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .play-btn:hover { transform: scale(1.15); }

        canvas { position: absolute; top: 0; left: 0; outline: none; }
    </style>
</head>
<body>

<div id="identity-section">
    <div class="plumbob"></div>
    <div>
        <input type="text" id="simName" placeholder="ENTER NAME...">
        <div class="gender-select">
            <button class="gender-btn" id="btnMale">♂ MALE</button>
            <button class="gender-btn" id="btnFemale">♀ FEMALE</button>
        </div>
    </div>
</div>

<div id="category-nav">
    <div class="nav-circle" title="Body">👤</div>
    <div class="nav-circle" title="Hair">💇</div>
    <div class="nav-circle" title="Clothing">👕</div>
    <div class="nav-circle" title="Traits">🧠</div>
</div>

<div id="play-action">
    <button class="play-btn" onclick="saveSim()">PLAY</button>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
    }
}
</script>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    // 1. Setup Scene
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // 2. High-Quality "Studio" Lighting
    const ambient = new THREE.AmbientLight(0xffffff, 1.0);
    scene.add(ambient);

    const keyLight = new THREE.DirectionalLight(0xffffff, 1.2);
    keyLight.position.set(2, 4, 5);
    scene.add(keyLight);

    const fillLight = new THREE.DirectionalLight(0xffffff, 0.6);
    fillLight.position.set(-2, 2, 2);
    scene.add(fillLight);

    camera.position.set(0, 1.4, 4.5);

    let currentModel;
    const loader = new GLTFLoader();

    window.loadModel = function(modelName) {
        if (currentModel) scene.remove(currentModel);

        loader.load('./models/' + modelName, (gltf) => {
            currentModel = gltf.scene;
            
            // Auto-center and Scale logic
            const box = new THREE.Box3().setFromObject(currentModel);
            const center = box.getCenter(new THREE.Vector3());
            currentModel.position.sub(center); 
            currentModel.position.y = -0.9; // Position feet near bottom

            scene.add(currentModel);
        }, undefined, (err) => console.error("Error loading model:", err));
    }

    // Assign buttons
    document.getElementById('btnMale').onclick = () => loadModel('Superhero_Male_FullBody.gltf');
    document.getElementById('btnFemale').onclick = () => loadModel('Superhero_Female_FullBody.gltf');

    // Default load
    loadModel('Superhero_Male_FullBody.gltf');

    function animate() {
        requestAnimationFrame(animate);
        if(currentModel) currentModel.rotation.y += 0.004;
        renderer.render(scene, camera);
    }
    animate();

    window.onresize = () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    };
</script>

<script>
    // Supabase logic (Non-module)
    const SUPABASE_URL = 'https://sjomitglpwjyttsaxjat.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_GC2hg2u7yvF5N2oRUr2VnA_VxxN3Iz1';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function saveSim() {
        const name = document.getElementById('simName').value;
        if(!name) return alert("Give your Sim a name!");
        
        const { data: { user } } = await _supabase.auth.getUser();
        if(!user) return alert("Please Login!");

        await _supabase.from('sims').insert([{ owner_id: user.id, name: name }]);
        window.location.href = "map.html";
    }
</script>
</body>
</html>
