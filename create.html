<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create A Sim | Fixed Scale & UI</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --ts-blue-light: #5ba8f5;
            --ts-blue-dark: #1b4e8d;
            --ts-green: #4ecc70;
            --glass: rgba(255, 255, 255, 0.2);
        }

        body { 
            margin: 0; 
            background: radial-gradient(circle at center, var(--ts-blue-light) 0%, var(--ts-blue-dark) 100%); 
            font-family: "Segoe UI", sans-serif;
            overflow: hidden; 
            color: white;
            height: 100vh;
        }

        /* UI LAYER FIX: Z-index 1000 and pointer-events: none */
        #ui-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1000;
            pointer-events: none; 
        }

        /* Makes buttons clickable again */
        .clickable { pointer-events: auto !important; cursor: pointer; }

        #identity-panel { position: absolute; top: 30px; left: 30px; display: flex; align-items: center; }
        .plumbob { width: 40px; height: 40px; background: #7fff00; clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); margin-right: 15px; }

        #simName {
            background: rgba(0,0,0,0.2); border: none; border-bottom: 2px solid white;
            color: white; font-size: 24px; padding: 5px; outline: none; width: 250px;
        }

        .glass-panel {
            position: absolute; background: var(--glass); backdrop-filter: blur(15px);
            padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.3);
            display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        #skin-panel { top: 120px; left: 30px; display: block; }
        #closet-panel { top: 30px; right: 100px; width: 220px; }

        .item-btn {
            width: 100%; background: white; color: #333; border: none;
            padding: 12px; margin-bottom: 10px; border-radius: 8px; font-weight: bold;
        }

        #category-nav { position: absolute; top: 30px; right: 30px; display: flex; flex-direction: column; gap: 10px; }
        .nav-btn { width: 55px; height: 55px; background: var(--glass); border-radius: 50%; display: flex; justify-content: center; align-items: center; border: 1px solid white; }

        .play-btn {
            position: absolute; bottom: 30px; right: 30px;
            width: 100px; height: 100px; background: var(--ts-green);
            border: 4px solid white; border-radius: 50%; color: white; font-weight: 900;
        }

        /* 3D Canvas sits BEHIND the UI */
        canvas { position: absolute; top: 0; left: 0; z-index: 1; outline: none; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div id="identity-panel" class="clickable">
        <div class="plumbob"></div>
        <input type="text" id="simName" placeholder="NAME...">
    </div>

    <div id="skin-panel" class="glass-panel clickable">
        <p style="margin:0 0 10px 0; font-size: 12px;">SKIN TONE</p>
        <input type="color" id="skinColorPicker" class="clickable" value="#e6b291" style="width:60px; height:60px; border:none; cursor:pointer;">
    </div>

    <div id="closet-panel" class="glass-panel clickable">
        <p style="margin:0 0 10px 0; font-weight:bold;">OUTFITS</p>
        <button class="item-btn clickable" onclick="addClothing('Vintage Asian Dress Belt.gltf')">Asian Dress</button>
        <button class="item-btn clickable" style="background:#ff4d4d; color:white;" onclick="removeClothing()">Remove</button>
    </div>

    <div id="category-nav">
        <div class="nav-btn clickable" onclick="showPanel('skin-panel')">👤</div>
        <div class="nav-btn clickable" onclick="showPanel('closet-panel')">👕</div>
    </div>

    <button class="play-btn clickable" onclick="saveSim()">PLAY</button>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
    }
}
</script>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 1.5));
    camera.position.set(0, 1, 4);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0.8, 0);

    let currentModel, currentClothing;
    const loader = new GLTFLoader();

    window.showPanel = (id) => {
        document.querySelectorAll('.glass-panel').forEach(p => p.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }

    // Load character
    loader.load('./models/Superhero_Male_FullBody.gltf', (gltf) => {
        currentModel = gltf.scene;
        currentModel.position.y = -0.5;
        scene.add(currentModel);
    });

    // CLOTHING FIX: Added massive scale reduction (0.01)
    window.addClothing = (file) => {
        if (currentClothing) scene.remove(currentClothing);
        loader.load('./models/' + file, (gltf) => {
            currentClothing = gltf.scene;
            currentClothing.position.copy(currentModel.position);
            
            // This forces the dress to shrink to a normal size
            currentClothing.scale.set(0.01, 0.01, 0.01); 
            
            scene.add(currentClothing);
        });
    }

    window.removeClothing = () => { if(currentClothing) scene.remove(currentClothing); };

    document.getElementById('skinColorPicker').oninput = (e) => {
        if (currentModel) currentModel.traverse(n => { if(n.isMesh) n.material.color.set(e.target.value); });
    }

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
