<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create A Sim | High Fidelity</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --ts-blue-light: #5ba8f5;
            --ts-blue-dark: #1b4e8d;
            --ts-green: #4ecc70;
            --glass: rgba(255, 255, 255, 0.15);
        }

        body { 
            margin: 0; 
            background: radial-gradient(circle at center, var(--ts-blue-light) 0%, var(--ts-blue-dark) 100%); 
            font-family: "Segoe UI", sans-serif;
            overflow: hidden; 
            color: white;
            height: 100vh;
        }

        #master-ui {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        .clickable { pointer-events: auto; }

        /* Left Identity Panel */
        #identity-panel {
            position: absolute;
            top: 30px; left: 30px;
            display: flex;
            align-items: center;
        }

        .plumbob {
            width: 45px; height: 45px;
            background: #7fff00;
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
            margin-right: 15px;
            filter: drop-shadow(0 0 10px rgba(127, 255, 0, 0.8));
        }

        #simName {
            background: rgba(255,255,255,0.1);
            border: none;
            border-bottom: 2px solid white;
            color: white; font-size: 28px; padding: 5px; outline: none; width: 320px;
        }

        /* Panels (Skin & Closet) */
        .glass-panel {
            position: absolute;
            background: var(--glass);
            backdrop-filter: blur(15px);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            display: none;
        }

        #skin-panel { top: 150px; left: 30px; width: 120px; text-align: center; display: block; }
        #closet-panel { top: 30px; right: 110px; width: 200px; }

        #skinColorPicker { width: 80px; height: 80px; border: none; background: none; cursor: pointer; }

        .closet-item {
            width: 100%; background: rgba(0,0,0,0.2); border: 1px solid white;
            color: white; padding: 10px; margin-bottom: 8px; border-radius: 10px; cursor: pointer;
        }

        /* Right Nav Icons */
        #category-nav {
            position: absolute;
            top: 30px; right: 30px;
            display: flex; flex-direction: column; gap: 15px;
        }

        .nav-circle {
            width: 60px; height: 60px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer;
        }

        .play-btn {
            position: absolute;
            bottom: 40px; right: 40px;
            width: 120px; height: 120px;
            background: var(--ts-green);
            border: 6px solid white; border-radius: 50%;
            color: white; font-weight: 900; font-size: 22px; cursor: pointer;
        }

        canvas { position: absolute; top: 0; left: 0; z-index: 1; outline: none; }
    </style>
</head>
<body>

<div id="master-ui">
    <div id="identity-panel" class="clickable">
        <div class="plumbob"></div>
        <input type="text" id="simName" placeholder="ENTER NAME...">
    </div>

    <div id="skin-panel" class="glass-panel clickable">
        <label style="font-size: 11px; font-weight: bold;">SKIN TONE</label><br><br>
        <input type="color" id="skinColorPicker" value="#e6b291">
    </div>

    <div id="closet-panel" class="glass-panel clickable">
        <h3 style="margin:0 0 15px 0">CLOSET</h3>
        <button class="closet-item" onclick="addClothing('Vintage Asian Dress Belt.gltf')">Asian Dress</button>
        <button class="closet-item" style="background: #ff4d4d;" onclick="removeClothing()">Remove Outfit</button>
    </div>

    <div id="category-nav">
        <div class="nav-circle clickable" onclick="togglePanel('skin-panel')"><img src="https://img.icons8.com/ios-filled/35/ffffff/user-male-circle.png"></div>
        <div class="nav-circle clickable" onclick="togglePanel('closet-panel')"><img src="https://img.icons8.com/ios-filled/35/ffffff/t-shirt.png"></div>
    </div>

    <button class="play-btn clickable" onclick="saveSim()">PLAY</button>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
    }
}
</script>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 1.2));
    const dLight = new THREE.DirectionalLight(0xffffff, 1);
    dLight.position.set(5, 10, 7.5);
    scene.add(dLight);

    camera.position.set(0, 1.0, 5);
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0.8, 0);

    let currentModel, currentClothing;
    const loader = new GLTFLoader();

    // UI Helper
    window.togglePanel = (id) => {
        const p = document.getElementById(id);
        p.style.display = p.style.display === 'block' ? 'none' : 'block';
    };

    // Load Base Character
    window.loadModel = function(modelName) {
        if (currentModel) scene.remove(currentModel);
        loader.load('./models/' + modelName, (gltf) => {
            currentModel = gltf.scene;
            currentModel.position.y = -0.5;
            scene.add(currentModel);
        });
    }

    // Load Clothing on top of character
    window.addClothing = function(fileName) {
        if (currentClothing) scene.remove(currentClothing);
        loader.load('./models/' + fileName, (gltf) => {
            currentClothing = gltf.scene;
            
            // FIX: Match the dress to the Sim's exact spot
            currentClothing.position.copy(currentModel.position);
            currentClothing.rotation.copy(currentModel.rotation);
            
            // Scaling Fix: Many clothing items are huge. If it's too big, change .set(0.1, 0.1, 0.1)
            currentClothing.scale.set(1, 1, 1); 

            scene.add(currentClothing);
        });
    }

    window.removeClothing = () => { if(currentClothing) scene.remove(currentClothing); currentClothing = null; };

    document.getElementById('skinColorPicker').oninput = (e) => {
        if (!currentModel) return;
        currentModel.traverse((node) => { if (node.isMesh) node.material.color.set(e.target.value); });
    }

    loadModel('Superhero_Male_FullBody.gltf');

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    window.onresize = () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    };
</script>
</body>
</html>
