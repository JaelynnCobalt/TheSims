<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create A Sim | High Fidelity</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --ts-blue-light: #5ba8f5;
            --ts-blue-dark: #1b4e8d;
            --ts-green: #4ecc70;
        }

        body { 
            margin: 0; 
            background: radial-gradient(circle, var(--ts-blue-light) 0%, var(--ts-blue-dark) 100%); 
            font-family: "Segoe UI", sans-serif;
            overflow: hidden;
            color: white;
        }

        /* CRITICAL FIX: Ensure UI is above the 3D canvas */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100; /* High number so it's on top */
            pointer-events: none; /* Allows clicks to pass through empty space */
        }

        .interactive { pointer-events: auto; } /* Re-enables clicking for buttons/inputs */

        #identity-section {
            position: absolute;
            top: 40px;
            left: 40px;
            display: flex;
            align-items: center;
        }

        .plumbob {
            width: 40px;
            height: 40px;
            background: #7fff00;
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
            margin-right: 20px;
            filter: drop-shadow(0 0 10px rgba(127, 255, 0, 0.8));
        }

        #simName {
            background: none;
            border: none;
            border-bottom: 2px solid white;
            color: white;
            font-size: 24px;
            outline: none;
            width: 250px;
            text-transform: uppercase;
        }

        #category-nav {
            position: absolute;
            top: 40px;
            right: 40px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .nav-circle {
            width: 60px; height: 60px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; font-size: 24px;
        }

        /* Skin Tone Adjuster */
        #skin-panel {
            position: absolute;
            left: 40px;
            top: 150px;
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(5px);
        }

        .play-btn {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 110px; height: 110px;
            background: var(--ts-green);
            border: 5px solid white;
            border-radius: 50%;
            color: white; font-weight: bold;
            cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        canvas { position: absolute; top: 0; left: 0; z-index: 1; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div id="identity-section" class="interactive">
        <div class="plumbob"></div>
        <div>
            <input type="text" id="simName" placeholder="ENTER NAME...">
            <div style="margin-top:10px;">
                <button class="interactive" onclick="window.loadModel('Superhero_Male_FullBody.gltf')">MALE</button>
                <button class="interactive" onclick="window.loadModel('Superhero_Female_FullBody.gltf')">FEMALE</button>
            </div>
        </div>
    </div>

    <div id="skin-panel" class="interactive">
        <label>SKIN TONE</label><br>
        <input type="range" id="skinSlider" min="0" max="100" value="50" style="width:150px;">
    </div>

    <div id="category-nav">
        <div class="nav-circle interactive">👤</div>
        <div class="nav-circle interactive">💇</div>
        <div class="nav-circle interactive">👕</div>
        <div class="nav-circle interactive">🧠</div>
    </div>

    <button class="play-btn interactive" onclick="saveSim()">PLAY</button>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
    }
}
</script>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const ambient = new THREE.AmbientLight(0xffffff, 1.2);
    scene.add(ambient);
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(5, 5, 5);
    scene.add(light);

    camera.position.set(0, 1.2, 4);

    let currentModel;
    const loader = new GLTFLoader();

    window.loadModel = function(name) {
        if (currentModel) scene.remove(currentModel);
        loader.load('./models/' + name, (gltf) => {
            currentModel = gltf.scene;
            currentModel.position.y = -1;
            scene.add(currentModel);
        });
    }

    // Skin Tone Logic
    document.getElementById('skinSlider').addEventListener('input', (e) => {
        if (!currentModel) return;
        const val = e.target.value / 100;
        // Simple color math: moves from dark brown to light peach
        const r = 0.3 + (val * 0.6);
        const g = 0.2 + (val * 0.5);
        const b = 0.1 + (val * 0.4);
        
        currentModel.traverse((node) => {
            if (node.isMesh) node.material.color.setRGB(r, g, b);
        });
    });

    loadModel('Superhero_Male_FullBody.gltf');

    function animate() {
        requestAnimationFrame(animate);
        if(currentModel) currentModel.rotation.y += 0.005;
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
