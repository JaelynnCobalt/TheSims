<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CAS | Create A Sim</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --ts-blue: radial-gradient(circle, #5ba8f5 0%, #1b4e8d 100%);
            --glass: rgba(255, 255, 255, 0.15);
            --blur: blur(15px);
        }

        body { 
            margin: 0; 
            background: var(--ts-blue); 
            font-family: "Segoe UI", sans-serif;
            overflow: hidden;
            color: white;
        }

        /* Identity Panel - Top Left */
        #identity {
            position: absolute;
            top: 40px;
            left: 40px;
            z-index: 100;
        }

        .plumbob {
            width: 40px;
            height: 40px;
            background: #7fff00;
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
            display: inline-block;
            vertical-align: middle;
            filter: drop-shadow(0 0 10px #7fff00);
            margin-right: 15px;
        }

        #simName {
            background: none;
            border: none;
            border-bottom: 2px solid white;
            color: white;
            font-size: 24px;
            outline: none;
            width: 250px;
            text-transform: uppercase;
        }

        /* Right Side Navigation */
        #nav-panel {
            position: absolute;
            top: 40px;
            right: 40px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 100;
        }

        .icon-btn {
            width: 65px;
            height: 65px;
            background: var(--glass);
            backdrop-filter: var(--blur);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
            font-size: 24px;
        }

        .icon-btn:hover { background: rgba(255,255,255,0.3); transform: scale(1.1); }

        /* Gender Toggle Buttons */
        .gender-toggle { margin-top: 20px; display: flex; gap: 10px; }
        .g-btn {
            background: rgba(0,0,0,0.3);
            border: 1px solid white;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
        }

        /* The Big Green Play Button */
        .play-btn {
            position: absolute;
            bottom: 50px;
            right: 50px;
            width: 110px;
            height: 110px;
            background: #4ecc70;
            border: 5px solid white;
            border-radius: 50%;
            color: white;
            font-weight: 900;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            z-index: 100;
            transition: 0.3s;
        }

        .play-btn:hover { transform: scale(1.1); }

        canvas { position: absolute; top: 0; left: 0; outline: none; }
    </style>
</head>
<body>

<div id="identity">
    <div class="plumbob"></div>
    <input type="text" id="simName" placeholder="ENTER NAME...">
    <div class="gender-toggle">
        <button class="g-btn" onclick="window.loadModel('Superhero_Male_FullBody.gltf')">♂ MALE</button>
        <button class="g-btn" onclick="window.loadModel('Superhero_Female_FullBody.gltf')">♀ FEMALE</button>
    </div>
</div>

<div id="nav-panel">
    <div class="icon-btn">👤</div>
    <div class="icon-btn">💇</div>
    <div class="icon-btn">👕</div>
    <div class="icon-btn">🧠</div>
</div>

<button class="play-btn" onclick="saveSim()">PLAY</button>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
    }
}
</script>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // Studio Lighting
    scene.add(new THREE.AmbientLight(0xffffff, 1.2));
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(5, 5, 5);
    scene.add(light);

    camera.position.set(0, 1.2, 4); // Centered on the character's chest

    let currentModel;
    const loader = new GLTFLoader();

    window.loadModel = function(name) {
        if (currentModel) scene.remove(currentModel);
        
        loader.load('./models/' + name, (gltf) => {
            currentModel = gltf.scene;
            
            // FIX POSITION: This keeps his feet on the ground and centers him
            const box = new THREE.Box3().setFromObject(currentModel);
            const center = box.getCenter(new THREE.Vector3());
            currentModel.position.x = -center.x;
            currentModel.position.z = -center.z;
            currentModel.position.y = -1.5; // Adjusted to move him "up" into view
            
            scene.add(currentModel);
        });
    }

    loadModel('Superhero_Male_FullBody.gltf');

    function animate() {
        requestAnimationFrame(animate);
        if(currentModel) currentModel.rotation.y += 0.005;
        renderer.render(scene, camera);
    }
    animate();

    window.onresize = () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    };
</script>

<script>
    const SUPABASE_URL = 'https://sjomitglpwjyttsaxjat.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_GC2hg2u7yvF5N2oRUr2VnA_VxxN3Iz1';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function saveSim() {
        const name = document.getElementById('simName').value;
        if(!name) return alert("Name your Sim!");
        const { data: { user } } = await _supabase.auth.getUser();
        await _supabase.from('sims').insert([{ owner_id: user.id, name: name }]);
        window.location.href = "map.html";
    }
</script>
</body>
</html>
