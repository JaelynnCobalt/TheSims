<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create A Sim | High Fidelity Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --ts-blue: #5ba8f5;
            --ts-green: #4ecc70;
            --glass: rgba(255, 255, 255, 0.2);
        }

        body { 
            margin: 0; 
            background: radial-gradient(circle at center, #5ba8f5 0%, #1b4e8d 100%); 
            font-family: "Segoe UI", sans-serif;
            overflow: hidden; color: white; height: 100vh;
        }

        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9999; pointer-events: none; 
        }

        .clickable { pointer-events: auto !important; cursor: pointer; }

        #identity-panel { position: absolute; top: 30px; left: 30px; display: flex; align-items: center; }
        .plumbob { width: 40px; height: 40px; background: #7fff00; clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); margin-right: 15px; filter: drop-shadow(0 0 10px #7fff00); }

        .glass-panel {
            position: absolute; background: var(--glass); backdrop-filter: blur(20px);
            padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.4);
            display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        #appearance-panel { top: 150px; left: 30px; width: 200px; display: block; }
        #closet-panel { top: 30px; right: 110px; width: 250px; }
        #brain-panel { top: 30px; right: 110px; width: 300px; }

        .item-btn {
            width: 100%; background: white; color: #333; border: none;
            padding: 12px; margin-bottom: 8px; border-radius: 8px; font-weight: bold;
        }

        .gender-btn { padding: 8px 15px; background: rgba(255,255,255,0.2); border: 1px solid white; color: white; margin-top: 10px; border-radius: 5px; }

        #category-nav { position: absolute; top: 30px; right: 30px; display: flex; flex-direction: column; gap: 15px; }
        .nav-btn { width: 60px; height: 60px; background: var(--glass); border-radius: 50%; display: flex; justify-content: center; align-items: center; border: 1px solid white; }

        canvas { position: absolute; top: 0; left: 0; z-index: 1; }
        .slider-label { display: block; font-size: 11px; margin-top: 12px; font-weight: bold; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div id="identity-panel" class="clickable">
        <div class="plumbob"></div>
        <div>
            <input type="text" id="simName" placeholder="ENTER NAME..." style="background:rgba(0,0,0,0.3); border:none; border-bottom:2px solid white; color:white; font-size:24px; padding:10px; outline:none;">
            <div style="display: flex; gap: 5px;">
                <button class="gender-btn clickable" onclick="loadModel('Superhero_Male_FullBody.gltf')">♂ MALE</button>
                <button class="gender-btn clickable" onclick="loadModel('Superhero_Female_FullBody.gltf')">♀ FEMALE</button>
            </div>
        </div>
    </div>

    <div id="appearance-panel" class="glass-panel clickable">
        <label class="slider-label">SKIN TONE</label>
        <input type="color" id="skinColorPicker" class="clickable" value="#e6b291" style="width:100%; height:40px; border:none; cursor:pointer;">
        
        <label class="slider-label">HAIR COLOR</label>
        <input type="color" id="hairColorPicker" class="clickable" value="#4a2c2a" style="width:100%; height:40px; border:none; cursor:pointer;">

        <label class="slider-label">ARM POSE (TUCK)</label>
        <input type="range" id="armRotation" class="clickable" min="0" max="1.3" step="0.01" value="0" style="width:100%">
    </div>

    <div id="closet-panel" class="glass-panel clickable">
        <h3 style="margin:0 0 10px 0;">HAIR STYLES</h3>
        <button class="item-btn clickable" onclick="addAttachment('hair', 'Hair_Long.gltf')">Long Style</button>
        <button class="item-btn clickable" onclick="addAttachment('hair', 'Hair_Short.gltf')">Short Style</button>
        
        <h3 style="margin:15px 0 10px 0;">OUTFITS</h3>
        <button class="item-btn clickable" onclick="addAttachment('body', 'Vintage Asian Dress Belt.gltf')">Vintage Asian Dress</button>
        <button class="item-btn clickable" style="background:#ff4d4d; color:white;" onclick="clearAttachments()">Reset Outfit</button>
    </div>

    <div id="brain-panel" class="glass-panel clickable">
        <h3 style="margin-top:0;">ASPIRATION</h3>
        <select id="aspiration" class="clickable" style="width:100%; padding:8px; margin-bottom:15px;">
            <option>Wealth</option>
            <option>Knowledge</option>
            <option>Creativity</option>
            <option>Romantic</option>
        </select>
        <h3 style="margin-top:0;">TRAITS (MAX 3)</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
            <button class="item-btn clickable" onclick="this.style.background='#7fff00'">Ambitious</button>
            <button class="item-btn clickable" onclick="this.style.background='#7fff00'">Genius</button>
            <button class="item-btn clickable" onclick="this.style.background='#7fff00'">Cheerful</button>
            <button class="item-btn clickable" onclick="this.style.background='#7fff00'">Mean</button>
        </div>
    </div>

    <div id="category-nav">
        <div class="nav-btn clickable" onclick="togglePanel('appearance-panel')">👤</div>
        <div class="nav-btn clickable" onclick="togglePanel('closet-panel')">👕</div>
        <div class="nav-btn clickable" onclick="togglePanel('brain-panel')">🧠</div>
    </div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
    }
}
</script>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 1.5));
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(5, 10, 7.5);
    scene.add(light);

    camera.position.set(0, 1.2, 5);
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0.8, 0);

    let currentModel;
    let attachments = { hair: null, body: null };
    const loader = new GLTFLoader();

    window.togglePanel = (id) => {
        const p = document.getElementById(id);
        const isVisible = p.style.display === 'block';
        document.querySelectorAll('.glass-panel').forEach(el => el.style.display = 'none');
        p.style.display = isVisible ? 'none' : 'block';
    };

    window.loadModel = (name) => {
        if (currentModel) scene.remove(currentModel);
        clearAttachments();
        loader.load('./models/' + name, (gltf) => {
            currentModel = gltf.scene;
            currentModel.position.y = -0.5;
            scene.add(currentModel);
        });
    };

    window.addAttachment = (type, file) => {
        if (attachments[type]) scene.remove(attachments[type]);
        loader.load('./models/' + file, (gltf) => {
            const mesh = gltf.scene;
            if (type === 'body') {
                mesh.scale.set(0.015, 0.015, 0.015);
                mesh.position.set(0, -0.45, 0); // Grounded position
            } else {
                mesh.position.set(0, -0.5, 0); // Hair usually shares base origin
            }
            attachments[type] = mesh;
            scene.add(mesh);
        });
    };

    window.clearAttachments = () => {
        Object.keys(attachments).forEach(k => { if(attachments[k]) scene.remove(attachments[k]); attachments[k] = null; });
    };

    // FIX: Arm Slider now targets bone names common in GLTF exports
    document.getElementById('armRotation').oninput = (e) => {
        if (!currentModel) return;
        const val = parseFloat(e.target.value);
        currentModel.traverse(node => {
            if (node.isBone && node.name.toLowerCase().includes('arm')) {
                if (node.name.toLowerCase().includes('left')) node.rotation.z = -val;
                if (node.name.toLowerCase().includes('right')) node.rotation.z = val;
            }
        });
    };

    document.getElementById('skinColorPicker').oninput = (e) => {
        if (currentModel) currentModel.traverse(n => { if(n.isMesh) n.material.color.set(e.target.value); });
    };

    document.getElementById('hairColorPicker').oninput = (e) => {
        if (attachments.hair) attachments.hair.traverse(n => { if(n.isMesh) n.material.color.set(e.target.value); });
    };

    loadModel('Superhero_Male_FullBody.gltf');

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
