<style>
    #personality-overlay {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.4); /* Dimmed background */
        backdrop-filter: blur(8px);    /* High-fidelity blur effect */
        z-index: 2000; 
        display: none; /* Controlled by JS */
        justify-content: center;
        align-items: center;
        pointer-events: auto;
    }

    .personality-card {
        background: rgba(255, 255, 255, 0.95);
        color: #333;
        width: 450px;
        border-radius: 25px;
        padding: 30px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        text-align: center;
    }

    .trait-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        margin: 20px 0;
    }

    .trait-item {
        background: #eee;
        padding: 12px 5px;
        border-radius: 12px;
        cursor: pointer;
        font-size: 13px;
        font-weight: bold;
        border: 3px solid transparent;
        transition: all 0.2s ease;
    }

    .trait-item:hover {
        background: #e0e0e0;
    }

    .trait-item.selected {
        border-color: #5ba8f5;
        background: #e1f0ff;
        color: #1b4e8d;
    }

    .done-btn {
        background: #4ecc70;
        color: white;
        border: none;
        padding: 12px 40px;
        border-radius: 50px;
        font-weight: bold;
        cursor: pointer;
        font-size: 16px;
    }
</style>

<div id="personality-overlay">
    <div class="personality-card">
        <h2 style="margin:0 0 10px 0; color:#1b4e8d;">ASPIRATION</h2>
        <select id="aspiration" class="clickable" style="width:100%; padding:10px; border-radius:10px; border:1px solid #ccc;">
            <option value="Wealth">💰 Wealth</option>
            <option value="Knowledge">🧠 Knowledge</option>
            <option value="Creativity">🎨 Creativity</option>
            <option value="Love">❤️ Love</option>
        </select>

        <h2 style="margin:20px 0 0 0; color:#1b4e8d;">TRAITS (MAX 3)</h2>
        <div class="trait-grid">
            <div class="trait-item clickable" onclick="toggleTrait(this, 'Ambitious')">Ambitious</div>
            <div class="trait-item clickable" onclick="toggleTrait(this, 'Cheerful')">Cheerful</div>
            <div class="trait-item clickable" onclick="toggleTrait(this, 'Genius')">Genius</div>
            <div class="trait-item clickable" onclick="toggleTrait(this, 'Gloomy')">Gloomy</div>
            <div class="trait-item clickable" onclick="toggleTrait(this, 'Loner')">Loner</div>
            <div class="trait-item clickable" onclick="toggleTrait(this, 'Mean')">Mean</div>
        </div>

        <button class="done-btn clickable" onclick="closePersonality()">DONE</button>
    </div>
</div>

<script>
    let selectedTraits = [];

    // Function to show the modal when clicking the brain icon
    window.openPersonality = function() {
        document.getElementById('personality-overlay').style.display = 'flex';
    };

    // Function to hide the modal
    window.closePersonality = function() {
        document.getElementById('personality-overlay').style.display = 'none';
    };

    // Logic for selecting/deselecting traits
    window.toggleTrait = function(element, traitName) {
        if (selectedTraits.includes(traitName)) {
            // Deselect
            selectedTraits = selectedTraits.filter(t => t !== traitName);
            element.classList.remove('selected');
        } else {
            // Select if under limit
            if (selectedTraits.length < 3) {
                selectedTraits.push(traitName);
                element.classList.add('selected');
            } else {
                alert("Sims can only have 3 personality traits!");
            }
        }
    };
</script>
