<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CAS | Create A Sim</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.158.0/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/loaders/GLTFLoader.js"></script>
    <style>
        body { margin: 0; background: radial-gradient(circle, #4a90e2, #1a2a6c); font-family: 'Segoe UI', sans-serif; overflow: hidden; color: white; }
        #ui-layer { position: absolute; top: 20px; left: 20px; width: 300px; z-index: 10; }
        .panel { background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.3); margin-bottom: 10px; }
        input[type="text"] { background: white; border: none; padding: 8px; border-radius: 5px; width: 100%; color: black; }
        .gender-btn { background: #0f3460; color: white; border: none; padding: 8px 15px; margin-top: 10px; cursor: pointer; border-radius: 5px; }
        .bottom-nav { position: absolute; bottom: 0; width: 100%; height: 80px; background: rgba(0, 0, 0, 0.5); display: flex; justify-content: center; align-items: center; gap: 50px; }
        #viewport { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .save-btn { position: absolute; bottom: 100px; right: 40px; z-index: 10; background: #4ecc70; border: none; padding: 15px 40px; color: white; font-weight: bold; border-radius: 30px; cursor: pointer; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div class="panel">
        <div style="display: flex; align-items: center; gap: 10px;">
            <div style="width:30px; height:30px; background:#7fff00; clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);"></div>
            <input type="text" id="simName" placeholder="Enter Name...">
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="gender-btn" onclick="loadModel('Superhero_Male_FullBody.gltf')">Male</button>
            <button class="gender-btn" onclick="loadModel('Superhero_Female_FullBody.gltf')">Female</button>
        </div>
    </div>
</div>

<div class="bottom-nav">
    <div>👕 Clothing</div>
    <div>💇 Hair</div>
    <div>🧠 Traits</div>
</div>

<button class="save-btn" onclick="saveSim()">PLAY</button>
<canvas id="viewport"></canvas>

<script>
    const SUPABASE_URL = 'https://sjomitglpwjyttsaxjat.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_GC2hg2u7yvF5N2oRUr2VnA_VxxN3Iz1';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('viewport'), antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);

    scene.add(new THREE.AmbientLight(0xffffff, 1));
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(5, 10, 7.5);
    scene.add(light);

    camera.position.set(0, 1.5, 3.5);

    let currentSimModel;
    const loader = new THREE.GLTFLoader();

    function loadModel(modelName) {
        if (currentSimModel) scene.remove(currentSimModel);
        
        // This looks specifically into your 'models' folder
        loader.load('./models/' + modelName, function(gltf) {
            currentSimModel = gltf.scene;
            currentSimModel.position.y = -1; // Adjust so they stand on the invisible floor
            scene.add(currentSimModel);
        }, undefined, function(error) {
            console.error("Error loading model:", error);
        });
    }

    // Default load
    loadModel('Superhero_Male_FullBody.gltf');

    function animate() {
        requestAnimationFrame(animate);
        if(currentSimModel) currentSimModel.rotation.y += 0.005;
        renderer.render(scene, camera);
    }
    animate();

    async function saveSim() {
        const name = document.getElementById('simName').value;
        const { data: { user } } = await _supabase.auth.getUser();
        if(!user) return alert("Login first!");
        await _supabase.from('sims').insert([{ owner_id: user.id, name: name }]);
        window.location.href = "map.html";
    }
</script>
</body>
</html>
