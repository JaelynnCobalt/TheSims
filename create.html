<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create A Sim | Final Fix</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --ts-blue-light: #5ba8f5;
            --ts-blue-dark: #1b4e8d;
            --ts-green: #4ecc70;
            --glass: rgba(255, 255, 255, 0.2);
        }

        body { 
            margin: 0; 
            background: radial-gradient(circle at center, var(--ts-blue-light) 0%, var(--ts-blue-dark) 100%); 
            font-family: "Segoe UI", sans-serif;
            overflow: hidden; 
            color: white;
            height: 100vh;
        }

        /* UI LAYER - Always on top, mouse-clicks pass through empty space */
        #ui-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 9999;
            pointer-events: none; 
        }

        .clickable { pointer-events: auto !important; cursor: pointer; }

        /* Panels */
        #identity-panel { position: absolute; top: 30px; left: 30px; display: flex; align-items: center; }
        .plumbob { width: 40px; height: 40px; background: #7fff00; clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); margin-right: 15px; }

        #simName {
            background: rgba(0,0,0,0.3); border: none; border-bottom: 2px solid white;
            color: white; font-size: 24px; padding: 10px; outline: none; width: 300px;
        }

        .glass-panel {
            position: absolute; background: var(--glass); backdrop-filter: blur(20px);
            padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.4);
            display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        #skin-panel { top: 140px; left: 30px; width: 150px; text-align: center; display: block; }
        #closet-panel { top: 30px; right: 110px; width: 240px; }

        .item-btn {
            width: 100%; background: white; color: #333; border: none;
            padding: 12px; margin-bottom: 10px; border-radius: 8px; font-weight: bold;
        }

        .gender-btn {
            padding: 8px 15px; background: rgba(255,255,255,0.2); border: 1px solid white;
            color: white; margin-top: 10px; border-radius: 5px;
        }

        /* Nav */
        #category-nav { position: absolute; top: 30px; right: 30px; display: flex; flex-direction: column; gap: 15px; }
        .nav-btn { 
            width: 60px; height: 60px; background: var(--glass); border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; border: 1px solid white; 
        }

        canvas { position: absolute; top: 0; left: 0; z-index: 1; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div id="identity-panel" class="clickable">
        <div class="plumbob"></div>
        <div>
            <input type="text" id="simName" placeholder="ENTER NAME...">
            <div style="display: flex; gap: 5px;">
                <button class="gender-btn clickable" onclick="loadModel('Superhero_Male_FullBody.gltf')">♂ MALE</button>
                <button class="gender-btn clickable" onclick="loadModel('Superhero_Female_FullBody.gltf')">♀ FEMALE</button>
            </div>
        </div>
    </div>

    <div id="skin-panel" class="glass-panel clickable">
        <p style="margin:0 0 10px 0; font-weight: bold;">SKIN TONE</p>
        <input type="color" id="skinColorPicker" class="clickable" value="#e6b291" style="width:100%; height:60px; border:none; cursor:pointer;">
    </div>

    <div id="closet-panel" class="glass-panel clickable">
        <h3 style="margin-top:0;">CLOSET</h3>
        <button class="item-btn clickable" onclick="addClothing('Vintage Asian Dress Belt.gltf')">Vintage Asian Dress</button>
        <button class="item-btn clickable" style="background:#ff4d4d; color:white;" onclick="removeClothing()">Remove Outfit</button>
    </div>

    <div id="category-nav">
        <div class="nav-btn clickable" onclick="togglePanel('skin-panel')">👤</div>
        <div class="nav-btn clickable" onclick="togglePanel('closet-panel')">👕</div>
    </div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
    }
}
</script>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 1.5));
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(5, 10, 7.5);
    scene.add(light);

    camera.position.set(0, 1.2, 5);
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0.8, 0);

    let currentModel, currentClothing;
    const loader = new GLTFLoader();

    window.togglePanel = (id) => {
        const p = document.getElementById(id);
        const isVisible = p.style.display === 'block';
        document.querySelectorAll('.glass-panel').forEach(el => el.style.display = 'none');
        p.style.display = isVisible ? 'none' : 'block';
    };

    window.loadModel = (name) => {
        if (currentModel) scene.remove(currentModel);
        if (currentClothing) scene.remove(currentClothing); // Remove dress if switching genders
        loader.load('./models/' + name, (gltf) => {
            currentModel = gltf.scene;
            currentModel.position.y = -0.5;
            scene.add(currentModel);
        });
    };

    window.addClothing = (file) => {
        if (currentClothing) scene.remove(currentClothing);
        loader.load('./models/' + file, (gltf) => {
            currentClothing = gltf.scene;
            
            // CENTER & SCALE FIX
            // Box3 helps us find the center of the dress model if its origin is broken
            const box = new THREE.Box3().setFromObject(currentClothing);
            const center = box.getCenter(new THREE.Vector3());
            currentClothing.position.x += (currentModel.position.x - center.x);
            currentClothing.position.y += (currentModel.position.y - center.y) + 0.8; // Adjust height
            currentClothing.position.z += (currentModel.position.z - center.z);
            
            // This is likely the scale you need (0.01 = 100x smaller)
            currentClothing.scale.set(0.015, 0.015, 0.015); 
            
            scene.add(currentClothing);
        });
    };

    window.removeClothing = () => { if(currentClothing) scene.remove(currentClothing); currentClothing = null; };

    document.getElementById('skinColorPicker').oninput = (e) => {
        if (currentModel) currentModel.traverse(n => { if(n.isMesh) n.material.color.set(e.target.value); });
    };

    loadModel('Superhero_Male_FullBody.gltf');

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
