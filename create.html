<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create A Sim | The Sims 4 Style</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.158.0/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/loaders/GLTFLoader.js"></script>
    <style>
        body { 
            margin: 0; 
            padding: 0;
            background: radial-gradient(circle, #5ba8f5 0%, #1b4e8d 100%); 
            font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            color: white;
        }

        /* Top Left Identity Area */
        #identity-container {
            position: absolute;
            top: 40px;
            left: 40px;
            display: flex;
            align-items: center;
            z-index: 10;
        }

        .plumbob-icon {
            width: 45px;
            height: 45px;
            background: #7fff00;
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
            margin-right: 15px;
            filter: drop-shadow(0 0 10px rgba(127, 255, 0, 0.8));
        }

        #simName {
            background: none;
            border: none;
            border-bottom: 2px solid rgba(255,255,255,0.8);
            color: white;
            font-size: 24px;
            font-weight: 300;
            outline: none;
            width: 250px;
            letter-spacing: 1px;
        }

        /* Right Side Navigation Menu */
        #nav-menu {
            position: absolute;
            top: 40px;
            right: 40px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 10;
        }

        .nav-button {
            width: 65px;
            height: 65px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 28px;
        }

        .nav-button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        .gender-toggle {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        .gender-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid white;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
        }

        /* Bottom Play Button */
        #play-container {
            position: absolute;
            bottom: 40px;
            right: 40px;
            z-index: 10;
        }

        .play-button {
            width: 100px;
            height: 100px;
            background: #4ecc70;
            border: 5px solid white;
            border-radius: 50%;
            color: white;
            font-weight: 900;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        .play-button:hover { transform: scale(1.1) rotate(5deg); }

        #viewport { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
    </style>
</head>
<body>

<div id="identity-container">
    <div class="plumbob-icon"></div>
    <div>
        <input type="text" id="simName" placeholder="ENTER NAME...">
        <div class="gender-toggle">
            <button class="gender-btn" onclick="loadModel('Superhero_Male_FullBody.gltf')">MALE</button>
            <button class="gender-btn" onclick="loadModel('Superhero_Female_FullBody.gltf')">FEMALE</button>
        </div>
    </div>
</div>

<div id="nav-menu">
    <div class="nav-button" title="Body">👤</div>
    <div class="nav-button" title="Hair">💇</div>
    <div class="nav-button" title="Clothing">👕</div>
    <div class="nav-button" title="Aspiration">🌟</div>
    <div class="nav-button" title="Traits">🧠</div>
</div>

<div id="play-container">
    <button class="play-button" onclick="saveSim()">PLAY</button>
</div>

<canvas id="viewport"></canvas>

<script>
    const SUPABASE_URL = 'https://sjomitglpwjyttsaxjat.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_GC2hg2u7yvF5N2oRUr2VnA_VxxN3Iz1';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 1. Scene Setup
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('viewport'), antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);

    // 2. High-Quality Lighting (Sims Studio Style)
    const ambient = new THREE.AmbientLight(0xffffff, 1.2);
    scene.add(ambient);

    const frontLight = new THREE.DirectionalLight(0xffffff, 1);
    frontLight.position.set(0, 2, 4);
    scene.add(frontLight);

    const backLight = new THREE.DirectionalLight(0xffffff, 0.8);
    backLight.position.set(0, 2, -4);
    scene.add(backLight);

    camera.position.set(0, 1.5, 5);

    let currentModel;
    const loader = new THREE.GLTFLoader();

    // 3. Robust Model Loader with Auto-Scaling
    function loadModel(modelName) {
        if (currentModel) scene.remove(currentModel);

        loader.load('./models/' + modelName, function(gltf) {
            currentModel = gltf.scene;

            // FIX: This centers and scales the model regardless of its original size
            const box = new THREE.Box3().setFromObject(currentModel);
            const size = box.getSize(new THREE.Vector3());
            const center = box.getCenter(new THREE.Vector3());
            
            // Re-center model
            currentModel.position.x += (currentModel.position.x - center.x);
            currentModel.position.y += (currentModel.position.y - center.y);
            currentModel.position.z += (currentModel.position.z - center.z);
            
            // Adjust standing position
            currentModel.position.y = -1; 

            scene.add(currentModel);
            console.log("Model successfully visible!");
        }, undefined, function(error) {
            console.error("Load failed. Check if .bin files are in the models/ folder!", error);
        });
    }

    // Default Load
    loadModel('Superhero_Male_FullBody.gltf');

    function animate() {
        requestAnimationFrame(animate);
        if(currentModel) currentModel.rotation.y += 0.005;
        renderer.render(scene, camera);
    }
    animate();

    async function saveSim() {
        const name = document.getElementById('simName').value;
        const { data: { user } } = await _supabase.auth.getUser();
        if(!user) return alert("Login to save!");

        await _supabase.from('sims').insert([{ owner_id: user.id, name: name }]);
        window.location.href = "map.html";
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
